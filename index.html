<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise IT Support AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'], 
                        mono: ['Fira Code', 'monospace'] 
                    },
                    animation: {
                        'message-slide-up': 'messageSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'data-stream-v': 'dataStreamV 8s linear infinite',
                        'data-stream-h': 'dataStreamH 12s linear infinite',
                    },
                    keyframes: {
                        messageSlideUp: {
                            '0%': { opacity: '0', transform: 'translate3d(0, 20px, 0)' },
                            '100%': { opacity: '1', transform: 'translate3d(0, 0, 0)' }
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(16, 185, 129, 0.8))' },
                            '50%': { opacity: .4, filter: 'drop-shadow(0 0 2px rgba(16, 185, 129, 0.2))' }
                        },
                        dataStreamV: {
                            '0%': { transform: 'translateY(-100%)', opacity: 0 },
                            '10%': { opacity: 1 },
                            '90%': { opacity: 1 },
                            '100%': { transform: 'translateY(100vh)', opacity: 0 }
                        },
                        dataStreamH: {
                            '0%': { transform: 'translateX(-100%)', opacity: 0 },
                            '10%': { opacity: 1 },
                            '90%': { opacity: 1 },
                            '100%': { transform: 'translateX(100vw)', opacity: 0 }
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; /* Deepest slate/navy */
            color: #E2E8F0; 
            /* Cyber/Tech blueprint grid */
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.5); }
        
        /* Tech-focused Glassmorphism */
        .vision-glass {
            position: relative;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(2, 6, 23, 0.9));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-top: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .vision-input-dock {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 -10px 40px -10px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .vision-input-dock:focus-within {
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 -10px 40px -10px rgba(0, 0, 0, 0.8), 0 0 20px -5px rgba(56, 189, 248, 0.3);
        }

        /* Fiber Optic Data Streams */
        .data-stream-v {
            position: absolute;
            width: 1px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.8), transparent);
            filter: blur(1px);
            z-index: 0;
        }
        
        .data-stream-h {
            position: absolute;
            height: 1px;
            width: 250px;
            background: linear-gradient(to right, transparent, rgba(139, 92, 246, 0.8), transparent);
            filter: blur(1px);
            z-index: 0;
        }

        /* Mandatory spacing for floating dock */
        #chatBox { padding-bottom: 250px !important; }
        
        /* Terminal Markdown Styling */
       .prose p { 
    margin-bottom: 0.85em; 
    line-height: 1.7; 
    color: #F8FAFC; 
    font-weight: 300; /* Makes the font light and modern */
    letter-spacing: 0.025em; /* Adds a premium wide-tracking feel */
}
        .prose strong { color: #38BDF8; font-weight: 500; }
        .prose pre { 
            background: #020617 !important; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            border-left: 3px solid #38BDF8;
            border-radius: 0.5rem; 
            padding: 1rem; 
            margin: 1rem 0; 
            overflow-x: auto; 
        }
        .prose code { 
            font-family: 'Fira Code', monospace; 
            font-size: 0.85em; 
            background: rgba(56, 189, 248, 0.1); 
            padding: 0.2em 0.4em; 
            border-radius: 0.25rem; 
            color: #7DD3FC; 
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .prose pre code { background: transparent; padding: 0; color: #E2E8F0; border: none; }
        .prose ul { list-style-type: none; padding-left: 0.5em; }
        .prose li { position: relative; padding-left: 1.5em; margin-bottom: 0.5em; }
        .prose li::before { content: '>'; position: absolute; left: 0; color: #38BDF8; font-family: 'Fira Code', monospace; font-weight: bold; }
    </style>
</head>
<body class="h-screen w-full flex flex-col antialiased overflow-hidden selection:bg-cyan-500/30 selection:text-white">
    
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <canvas id="networkCanvas" class="absolute inset-0 w-full h-full opacity-40"></canvas>
        
        <div class="absolute top-0 left-[-10%] w-[50vw] h-[50vw] bg-blue-900/20 rounded-full blur-[150px]"></div>
        <div class="absolute bottom-0 right-[-10%] w-[50vw] h-[50vw] bg-indigo-900/20 rounded-full blur-[150px]"></div>

        <div class="data-stream-v left-[15%] animate-data-stream-v" style="animation-duration: 6s; animation-delay: 1s;"></div>
        <div class="data-stream-v left-[65%] animate-data-stream-v" style="animation-duration: 9s; animation-delay: 3s;"></div>
        <div class="data-stream-h top-[25%] animate-data-stream-h" style="animation-duration: 10s; animation-delay: 0s;"></div>
        <div class="data-stream-h top-[75%] animate-data-stream-h" style="animation-duration: 7s; animation-delay: 4s;"></div>
    </div>

    <div class="w-full h-full flex flex-col relative z-10 overflow-hidden">
        
        <header class="h-16 shrink-0 border-b border-sky-500/10 flex items-center justify-between px-6 md:px-10 bg-slate-950/60 backdrop-blur-md z-30">
            <div class="flex items-center gap-4">
                <div class="w-9 h-9 rounded bg-slate-900 border border-sky-500/30 flex items-center justify-center shadow-[0_0_15px_rgba(56,189,248,0.2)]">
                    <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="font-semibold text-[15px] text-white tracking-wide">IT Systems AI</h1>
                    
                </div>
            </div>
            
            
        </header>

        <div class="flex-1 overflow-y-auto w-full scroll-smooth z-10 relative">
            <div id="chatBox" class="max-w-4xl mx-auto w-full p-4 md:p-8 pt-8 flex flex-col space-y-6">
                
                <div class="flex flex-col space-y-1.5 w-full items-start">
                    <div class="vision-glass px-6 py-5 text-slate-200 text-[14px] md:text-[15px] leading-relaxed rounded-2xl rounded-tl-sm max-w-[95%] md:max-w-[85%]">
                        System initialized. I am your AI-enabled IT Support Agent. Query me regarding hardware diagnostics, networking protocols, or authorized manual procedures.
                    </div>
                    <span class="text-[10px] text-sky-500 font-mono px-2 uppercase tracking-widest opacity-80 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        System.Prompt
                    </span>
                </div>

            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#020617] via-[#020617]/90 to-transparent pt-24 pb-6 px-4 md:px-8 z-30 pointer-events-none">
            <div class="max-w-3xl mx-auto flex items-end vision-input-dock rounded-xl p-1.5 pointer-events-auto">
                
                <textarea 
                    id="userInput" 
                    rows="1"
                    placeholder="Enter support query..." 
                   class="flex-1 max-h-40 bg-transparent border-none outline-none text-slate-100 placeholder-slate-500/70 text-[14px] md:text-[15px] py-4 pl-4 pr-4 resize-none font-sans font-light tracking-wide leading-relaxed"
                    oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                ></textarea>
                
                <div class="p-1.5 shrink-0 flex items-end">
                    <button 
                        onclick="sendMessage()" 
                        class="bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 p-3 rounded-lg transition-all duration-200 flex items-center justify-center border border-sky-500/30 hover:border-sky-400 active:scale-95"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                            <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. IT Network Topology Canvas Engine ---
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, nodes;

        function initNetwork() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            nodes = [];
            // Calculate node count based on screen size (keeps it clean on mobile)
            const numNodes = Math.floor((width * height) / 15000); 

            for(let i = 0; i < numNodes; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 1.5 + 0.5
                });
            }
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(56, 189, 248, 0.5)';
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.15)';
            ctx.lineWidth = 1;

            for(let i = 0; i < nodes.length; i++) {
                let node = nodes[i];
                
                // Move nodes
                node.x += node.vx;
                node.y += node.vy;

                // Bounce off edges
                if(node.x < 0 || node.x > width) node.vx *= -1;
                if(node.y < 0 || node.y > height) node.vy *= -1;

                // Draw node
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw connections
                for(let j = i + 1; j < nodes.length; j++) {
                    let node2 = nodes[j];
                    let dist = Math.sqrt(Math.pow(node.x - node2.x, 2) + Math.pow(node.y - node2.y, 2));
                    
                    if(dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(node.x, node.y);
                        ctx.lineTo(node2.x, node2.y);
                        // Fade lines based on distance
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.2 - (dist/120) * 0.2})`;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawNetwork);
        }

        window.addEventListener('resize', initNetwork);
        initNetwork();
        drawNetwork();

        // --- 2. Chat API Logic ---
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = '';
            inputField.style.height = 'auto';
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            appendMessage(text, 'user', currentTime);

            try {
                // Change back to Cloud Run URL when deploying!
                const response = await fetch('https://it-support-chatbot-16t6.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: "capstone-session", message: text })
                });
                
                const data = await response.json();
                const botTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                appendMessage(data.reply, 'bot', botTime);

            } catch (error) {
                console.error("Connection Error:", error);
                const botTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                appendMessage("SYS_ERR: Connection to FastAPI backend failed. Verify server status.", 'bot', botTime);
            }
        }

        function appendMessage(text, sender, time) {
            const chatBox = document.getElementById('chatBox');
            const chatContainer = chatBox.parentElement; 
            
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col space-y-1.5 w-full opacity-0 animate-message-slide-up ${
                sender === 'user' ? 'items-end' : 'items-start'
            }`;

            const bubble = document.createElement('div');
            
           if (sender === 'user') {
    // Replaced 'font-mono' with 'font-sans font-light tracking-wide'
    bubble.className = `px-6 py-4 text-[14px] md:text-[15px] font-sans font-light tracking-wide bg-sky-900/40 text-sky-100 rounded-xl rounded-tr-sm border border-sky-500/30 shadow-[0_5px_15px_rgba(0,0,0,0.3)] max-w-[95%] md:max-w-[75%]`;
    // Removed the "> " terminal prefix
    bubble.innerText = text;

            } else {
                bubble.className = `px-6 py-5 text-[14px] md:text-[15px] max-w-[95%] md:max-w-[85%] vision-glass text-slate-200 rounded-2xl rounded-tl-sm prose prose-invert`;
                bubble.innerHTML = marked.parse(text);
            }

            const subMeta = document.createElement('div');
            subMeta.className = `flex items-center gap-3 px-2 ${
                sender === 'user' ? 'flex-row-reverse' : 'flex-row'
            }`;

            const timeSpan = document.createElement('span');
            timeSpan.className = 'text-[10px] font-mono text-slate-500 opacity-80';
            timeSpan.innerText = `[${time}]`;
            subMeta.appendChild(timeSpan);

            if (sender === 'bot') {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'text-slate-500 hover:text-sky-400 transition-colors flex items-center gap-1 text-[10px] font-mono uppercase px-2 py-1 rounded hover:bg-white/5 pointer-events-auto';
                copyBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0A2.25 2.25 0 0113.5 4.5h-3a2.25 2.25 0 01-2.166-1.5m7.332 0c.055.194.084.4.084.612v1.512c0 .732-.367 1.378-.934 1.762m-9.354 0c-.567-.384-.934-1.03-.934-1.762V3c0-.212.029-.418.084-.612m7.332 0c.546.045 1.09.114 1.632.206m-9.314.207a51.108 51.108 0 000 3.992M14 17.25c0 .345-.029.686-.085 1.018a10.97 10.97 0 01-6.848-6.848c.332-.056.673-.085 1.018-.085h6.25zm5.18 4.08a6.028 6.028 0 001.68-3.997V13.5h-3.75v3.75h3.75z" />
                    </svg> Copy`;
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    const originalHtml = copyBtn.innerHTML;
                    copyBtn.innerHTML = `<span class="text-emerald-400 flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg> Copied</span>`;
                    setTimeout(() => { copyBtn.innerHTML = originalHtml; }, 2000);
                };
                subMeta.appendChild(copyBtn);
            }

            wrapper.appendChild(bubble);
            wrapper.appendChild(subMeta);
            chatBox.appendChild(wrapper);

            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 300);
        }
    </script>
</body>
</html>
